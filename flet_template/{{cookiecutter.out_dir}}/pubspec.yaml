name: '{{ cookiecutter.project_name }}'
description: '{{ cookiecutter.project_description }}'
publish_to: none
version: 1.0.0+1
environment:
  sdk: '>=3.1.5 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flet: 0.85.3
  serious_python: 1.0.1
  package_info_plus: ^9.0.0
  path_provider: ^2.1.4
  path: ^1.9.0
  window_manager: ^0.5.1
  workmanager: ^0.5.2
  share_plus: ^12.0.2
  sqflite: ^2.3.3
dependency_overrides:
  flet: 0.85.3
  device_info_plus: 12.3.0
  connectivity_plus: 7.0.0
flutter:
  uses-material-design: true
  assets:
  - app/app.zip
  - app/app.zip.hash
